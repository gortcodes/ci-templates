name: Python CI

on:
  workflow_call:
    inputs:
      python-version:
        description: "Python version to install"
        type: string
        default: "3.12"
      working-directory:
        description: "Directory to run all steps from"
        type: string
        default: "."
      test-command:
        description: "Command used to run tests"
        type: string
        default: "pytest -q"
      lint:
        description: "Run ruff check"
        type: boolean
        default: true

jobs:
  ci:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ inputs.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python-version }}
          cache: pip
          cache-dependency-path: |
            ${{ inputs.working-directory }}/pyproject.toml
            ${{ inputs.working-directory }}/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f pyproject.toml ]; then
            pip install .
          elif [ -f requirements.txt ]; then
            pip install -r requirements.txt
          else
            echo "No pyproject.toml or requirements.txt found; skipping install."
          fi

      - name: Lint (ruff)
        if: ${{ inputs.lint }}
        run: |
          pip install ruff
          ruff check .

      - name: Run tests
        run: ${{ inputs.test-command }}
